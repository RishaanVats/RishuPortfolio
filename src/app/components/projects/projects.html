<div class="container py-5">
  <h2 class="fw-bold mb-4">Projects</h2>

  <p class="text-muted"></p>
  <!-- Project Seperation marker ======================== -->
  <div class="d-flex flex-wrap gap-3">
    @for(project of projects; track project.id){
    <div class="card project-card">
      <div class="project-img-wrapper">
        <img [src]="project.image" [alt]="project.title" class="project-img">
        <div class="project-overlay"></div>
        <span class="project-category">{{project.category}}</span>
      </div>
      <div class="project-card-body">
        <h3 class="project-title">{{project.title}}</h3>
        <p class="project-description">
          {{project.description}}
        </p>
        <div class="project-tech">
          @for(tech of project.techStack; track tech){
          <span class="tech-badge">{{tech}}</span>
          }
        </div>
        <div class="project-links">
          <a [href]="project.links.live" class="project-btn btn-primary-custom" target="_blank" rel="noopener"
            aria-label="Link to the project live demo">
            <i class="fas fa-external-link-alt icon"></i> Live Demo
          </a>
          <a [href]="project.links.code" class="project-btn btn-outline-custom" target="_blank" rel="noopener"
            aria-label="Link to the project code repository">
            <i class="fab fa-github icon"></i> Code
          </a>
        </div>
      </div>
    </div>
    }
  </div>
